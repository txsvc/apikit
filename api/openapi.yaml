openapi: '3.1.0'
info:
  title: apikit API
  version: 0.1.0
  description: >-
    The apikit API provides user management, organization management,
    authentication, and authorization services.

servers:
  - url: /api/v1
    description: Default mount point (configurable per deployment)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: >-
        Bearer token authentication supporting three credential types:
        Admin Token (format: <prefix>_admin_<64 hex chars>) for break-glass
        emergency access with global scope;
        API Key (format: <prefix>_<key_id>_<secret>) for user-scoped full
        access to own resources;
        PAT (format: <prefix>_pat_<token_id>_<secret>) for fine-grained
        per-permission access.

  headers:
    XRequestID:
      description: UUID for distributed tracing, present on every response
      schema:
        type: string
        format: uuid
    ETag:
      description: Opaque string for conditional requests. Derivation is an implementation detail of server_core.
      schema:
        type: string
    CacheControlNoStore:
      description: Cache-Control directive for mutable resources
      schema:
        type: string
        enum:
          - 'no-store'
    CacheControlNoCache:
      description: Cache-Control directive for health probes
      schema:
        type: string
        enum:
          - 'no-cache'
    CacheControlPublic:
      description: Cache-Control directive for static discovery endpoints
      schema:
        type: string
        enum:
          - 'public, max-age=300'

  parameters:
    IncludeBlocked:
      name: include_blocked
      in: query
      description: >-
        When false (default), only resources with status=active are returned.
        When true, resources with status=blocked are included.
      schema:
        type: boolean
        default: false

  schemas:
    User:
      type: object
      description: A user resource representing an authenticated account.
      required:
        - id
        - username
        - email
        - status
        - role
        - provider
        - provider_id
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the user.
        username:
          type: string
          description: Display name for the user, set at creation and immutable via PATCH.
        email:
          type: string
          description: Email address for the user, set at creation and immutable via PATCH.
        full_name:
          type:
            - string
            - 'null'
          description: Optional display name for the user. The only field updatable via PATCH.
        status:
          type: string
          enum:
            - active
            - blocked
          description: Current status of the user account.
        role:
          type: string
          enum:
            - admin
            - user
          description: Access level of the user.
        provider:
          type: string
          description: OAuth identity provider name (e.g. github, google).
        provider_id:
          type: string
          description: Unique user identifier assigned by the OAuth provider.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the user was created (RFC 3339, UTC with Z suffix).
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the user was last modified (RFC 3339, UTC with Z suffix).

    Organization:
      type: object
      description: An organization resource.
      required:
        - id
        - name
        - slug
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the organization.
        name:
          type: string
          description: Display name of the organization.
        slug:
          type: string
          description: URL-safe identifier string, unique within the system.
        url:
          type:
            - string
            - 'null'
          description: Optional URL associated with the organization.
        status:
          type: string
          enum:
            - active
            - blocked
          description: Current status of the organization.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the organization was created (RFC 3339, UTC with Z suffix).
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the organization was last modified (RFC 3339, UTC with Z suffix).

    OAuthProvider:
      type: object
      description: An OAuth provider configuration.
      required:
        - name
        - authorize_url
      properties:
        name:
          type: string
          description: Name of the OAuth provider (e.g. github, google).
        authorize_url:
          type: string
          description: URL to initiate the OAuth authorization flow.

    Error:
      type: object
      description: >-
        Standard error envelope. The code field equals the HTTP response
        status code exactly.
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: integer
              description: >-
                The HTTP status code of the response. Mirrors the HTTP status
                exactly — no additional error codes are used.
            message:
              type: string
              description: A human-readable error description.

    AuthCallbackResponse:
      type: object
      description: Response from the OAuth callback endpoint containing user and API key.
      required:
        - user
        - api_key
      properties:
        user:
          $ref: '#/components/schemas/User'
        api_key:
          type: object
          required:
            - key
            - key_id
            - expires_at
          properties:
            key:
              type: string
              description: Full API key string including the plaintext secret.
            key_id:
              type: string
              description: The random 8-character alphanumeric identifier portion of the API key.
            expires_at:
              type:
                - string
                - 'null'
              format: date-time
              description: >-
                When the API key expires (RFC 3339 UTC). Null when expires=0
                (permanent, no expiry).

    ApiKeyMetadata:
      type: object
      description: API key metadata returned in listings (no plaintext secret).
      required:
        - key_id
        - created_at
        - expires_at
        - revoked_at
      properties:
        key_id:
          type: string
          description: The random 8-character alphanumeric identifier portion of the API key.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the API key was created (RFC 3339, UTC with Z suffix).
        expires_at:
          type:
            - string
            - 'null'
          format: date-time
          description: >-
            When the API key expires (RFC 3339 UTC). Null when expires=0
            (permanent, no expiry).
        revoked_at:
          type:
            - string
            - 'null'
          format: date-time
          description: Timestamp when the API key was revoked (RFC 3339, UTC). Null if not revoked.

    ApiKey:
      type: object
      description: API key object returned at creation or refresh, including the plaintext secret.
      required:
        - key
        - key_id
        - expires_at
      properties:
        key:
          type: string
          description: >-
            Full API key credential string including the plaintext secret.
            Format: <prefix>_<key_id>_<secret>. Only returned at creation or
            refresh — store securely.
        key_id:
          type: string
          description: The random 8-character alphanumeric identifier portion of the API key.
        expires_at:
          type:
            - string
            - 'null'
          format: date-time
          description: >-
            When the API key expires (RFC 3339 UTC). Null when expires=0
            (permanent, no expiry).

    PatMetadata:
      type: object
      description: PAT metadata returned in listings (no plaintext secret).
      required:
        - token_id
        - name
        - permissions
        - created_at
        - expires_at
        - revoked_at
      properties:
        token_id:
          type: string
          description: The random identifier portion of the personal access token.
        name:
          type: string
          description: Human-readable label for the PAT.
        permissions:
          type: array
          items:
            type: string
            pattern: '^[a-z_]+:[a-z_]+$'
            description: >-
              Permission string in resource_type:action format. Built-in
              permissions: users:read (read own profile and self-profile
              updates), orgs:read (read org records and membership lists),
              keys:read (list own API keys), keys:manage (refresh or revoke
              own API keys), tokens:read (list own PATs), tokens:manage
              (create or revoke own PATs).
          description: Array of granted permission strings.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the PAT was created (RFC 3339, UTC with Z suffix).
        expires_at:
          type:
            - string
            - 'null'
          format: date-time
          description: >-
            When the PAT expires (RFC 3339 UTC). Null when expires=0
            (permanent, no expiry).
        revoked_at:
          type:
            - string
            - 'null'
          format: date-time
          description: Timestamp when the PAT was revoked (RFC 3339, UTC). Null if not revoked.

    Pat:
      type: object
      description: PAT object returned at creation, including the plaintext secret.
      required:
        - token
        - token_id
        - name
        - permissions
        - expires_at
      properties:
        token:
          type: string
          description: >-
            Full PAT credential string including the plaintext secret.
            Format: <prefix>_pat_<token_id>_<secret>. Returned only at
            creation — store securely; it cannot be retrieved again.
        token_id:
          type: string
          description: The random identifier portion of the personal access token.
        name:
          type: string
          description: Human-readable label for the PAT.
        permissions:
          type: array
          items:
            type: string
            pattern: '^[a-z_]+:[a-z_]+$'
            description: >-
              Permission string in resource_type:action format. Built-in
              permissions: users:read (read own profile and self-profile
              updates), orgs:read (read org records and membership lists),
              keys:read (list own API keys), keys:manage (refresh or revoke
              own API keys), tokens:read (list own PATs), tokens:manage
              (create or revoke own PATs).
          description: Array of granted permission strings.
        expires_at:
          type:
            - string
            - 'null'
          format: date-time
          description: >-
            When the PAT expires (RFC 3339 UTC). Null when expires=0
            (permanent, no expiry).

  responses:
    BadRequest:
      description: Bad request — invalid or malformed request body.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestID'
        Cache-Control:
          $ref: '#/components/headers/CacheControlNoStore'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized — missing, invalid, expired, or revoked credentials.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestID'
        Cache-Control:
          $ref: '#/components/headers/CacheControlNoStore'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Forbidden — valid credentials but insufficient permissions or user blocked.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestID'
        Cache-Control:
          $ref: '#/components/headers/CacheControlNoStore'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Not Found — the requested resource does not exist.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestID'
        Cache-Control:
          $ref: '#/components/headers/CacheControlNoStore'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Conflict — a uniqueness constraint was violated.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestID'
        Cache-Control:
          $ref: '#/components/headers/CacheControlNoStore'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    PayloadTooLarge:
      description: Payload Too Large — the request body exceeds the configured size limit.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestID'
        Cache-Control:
          $ref: '#/components/headers/CacheControlNoStore'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnsupportedMediaType:
      description: Unsupported Media Type — Content-Type must be application/json.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestID'
        Cache-Control:
          $ref: '#/components/headers/CacheControlNoStore'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

paths:
  /healthz:
    servers:
      - url: /
    get:
      operationId: getHealthz
      summary: Liveness probe
      description: >-
        Liveness probe endpoint that always returns 200. Public — no
        authentication required.
      security: []
      responses:
        '200':
          description: Service is alive.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoCache'
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
                    enum:
                      - ok

  /readyz:
    servers:
      - url: /
    get:
      operationId: getReadyz
      summary: Readiness probe
      description: >-
        Readiness probe endpoint that pings the database. Returns 200 if
        healthy, 503 if the database is unreachable. Public — no
        authentication required.
      security: []
      responses:
        '200':
          description: Service is ready.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoCache'
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
                    enum:
                      - ok
        '503':
          description: Service is not ready — database unreachable.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoCache'
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
                    enum:
                      - unavailable

  /version:
    servers:
      - url: /
    get:
      operationId: getVersion
      summary: Version info
      description: >-
        Returns server version, build info, and mount point. Public — no
        authentication required.
      security: []
      responses:
        '200':
          description: Version information.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoCache'
          content:
            application/json:
              schema:
                type: object
                required:
                  - go_version
                  - commit
                  - build_time
                  - mount_point
                properties:
                  go_version:
                    type: string
                    description: Server version string.
                  commit:
                    type: string
                    description: Git commit hash of the server build.
                  build_time:
                    type: string
                    description: Server binary build timestamp.
                  mount_point:
                    type: string
                    description: Configured API mount point path.

  /auth/providers:
    get:
      operationId: getAuthProviders
      summary: List OAuth providers
      description: >-
        Lists configured OAuth providers. Public — no authentication required.
        Responses are cacheable for 5 minutes.
      security: []
      responses:
        '200':
          description: List of configured OAuth providers.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
            Cache-Control:
              $ref: '#/components/headers/CacheControlPublic'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OAuthProvider'

  /auth/callback:
    post:
      operationId: postAuthCallback
      summary: OAuth callback
      description: >-
        Exchanges an OAuth authorization code for a user record and API key.
        Public — no authentication required. Request body must use
        Content-Type: application/json or receive 415.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - provider
                - code
                - redirect_uri
              properties:
                provider:
                  type: string
                  description: OAuth provider name (e.g. github, google).
                code:
                  type: string
                  description: OAuth authorization code.
                redirect_uri:
                  type: string
                  description: OAuth redirect URI for validation.
                expires:
                  type: integer
                  enum:
                    - 0
                    - 30
                    - 60
                    - 90
                  default: 90
                  description: >-
                    Expiry in days for the issued API key. 0 means no expiry
                    (permanent); expires_at will be null. 30, 60, or 90 means
                    the key expires exactly 24h × N days from creation. Default
                    is 90 days.
      responses:
        '200':
          description: OAuth callback successful. Returns user and API key.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthCallbackResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'

  /user:
    get:
      operationId: getUser
      summary: Get authenticated user
      description: >-
        Retrieve the authenticated user's own profile. Accepts Admin Token,
        API Key, or PAT with users:read permission. Supports conditional
        requests via If-None-Match header.
        Request bodies must use Content-Type: application/json or receive 415.
        Response bodies use Content-Type: application/json; charset=utf-8.
        204 and 304 responses carry no body and no Content-Type.
      security:
        - bearerAuth: []
      parameters:
        - name: If-None-Match
          in: header
          description: ETag value for conditional request. If it matches, 304 is returned.
          schema:
            type: string
      responses:
        '200':
          description: Authenticated user profile.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
            ETag:
              $ref: '#/components/headers/ETag'
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '304':
          description: Not Modified — resource unchanged since the ETag.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
            ETag:
              $ref: '#/components/headers/ETag'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    patch:
      operationId: patchUser
      summary: Update authenticated user
      description: >-
        Update the authenticated user's own profile. Only full_name is
        updatable; username and email are immutable. Accepts Admin Token,
        API Key, or PAT with users:read permission.
        Request body must use Content-Type: application/json or receive 415.
        Response body uses Content-Type: application/json; charset=utf-8.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - full_name
              properties:
                full_name:
                  type: string
                  description: New display name for the user.
      responses:
        '200':
          description: Updated user profile.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'

  /user/keys:
    get:
      operationId: getUserKeys
      summary: List user's API keys
      description: >-
        List the authenticated user's API key(s). Accepts Admin Token,
        API Key, or PAT with keys:read permission.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of API key metadata.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiKeyMetadata'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /user/keys/{key_id}:
    delete:
      operationId: deleteUserKey
      summary: Revoke user's API key
      description: >-
        Revoke the authenticated user's own API key. Accepts Admin Token,
        API Key, or PAT with keys:manage permission.
      security:
        - bearerAuth: []
      parameters:
        - name: key_id
          in: path
          required: true
          schema:
            type: string
          description: The API key identifier.
      responses:
        '204':
          description: API key revoked successfully. No body.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /user/keys/{key_id}/refresh:
    post:
      operationId: refreshUserKey
      summary: Refresh user's API key
      description: >-
        Refresh the authenticated user's API key with a new secret. Accepts
        Admin Token, API Key, or PAT with keys:manage permission.
      security:
        - bearerAuth: []
      parameters:
        - name: key_id
          in: path
          required: true
          schema:
            type: string
          description: The API key identifier.
      responses:
        '200':
          description: Refreshed API key with new secret.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /user/tokens:
    get:
      operationId: getUserTokens
      summary: List user's PATs
      description: >-
        List the authenticated user's personal access tokens. Accepts Admin
        Token, API Key, or PAT with tokens:read permission.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of PAT metadata.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PatMetadata'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      operationId: createUserToken
      summary: Create a PAT
      description: >-
        Create a new personal access token for the authenticated user. Accepts
        Admin Token, API Key, or PAT with tokens:manage permission.
        Request body must use Content-Type: application/json or receive 415.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - permissions
              properties:
                name:
                  type: string
                  description: Human-readable label for the PAT.
                permissions:
                  type: array
                  items:
                    type: string
                    pattern: '^[a-z_]+:[a-z_]+$'
                    description: >-
                      Permission string in resource_type:action format.
                  description: Array of permission strings to grant.
                expires:
                  type: integer
                  enum:
                    - 0
                    - 30
                    - 60
                    - 90
                  default: 90
                  description: >-
                    Expiry in days for the PAT. 0 means no expiry (permanent);
                    expires_at will be null. 30, 60, or 90 means the token
                    expires exactly 24h × N days from creation. Default is 90
                    days.
      responses:
        '201':
          description: PAT created successfully.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pat'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'

  /user/tokens/{token_id}:
    get:
      operationId: getUserToken
      summary: Get a specific PAT
      description: >-
